<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>正在為您導向...</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        color: #64748b;
        font-size: 14px;
        text-align: center;
        padding: 0 24px;
      }
    </style>
  </head>
  <body>
    <p id="status">正在為您導向...</p>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
      ;(async function () {
        const statusEl = document.getElementById('status')

        // liff.state 包住的參數要等 LINE/LIFF 處理過才會展開成真正的 query string，
        // 而且觀察到「加好友」流程會把整個原始網址（含 liff.state= 這個 key 本身）
        // 再包一層 liff.state，所以要遞迴解到找到 t/j 為止，不能只解一層
        let current = new URLSearchParams(location.search)
        let clickToken = null
        let joinId = null
        for (let i = 0; i < 5; i++) {
          clickToken = current.get('t')
          joinId = current.get('j')
          if (clickToken || joinId) break
          const state = current.get('liff.state')
          if (!state) break
          current = new URLSearchParams(state)
        }

        if (!clickToken && !joinId) {
          statusEl.textContent = '缺少必要參數（除錯用，請截圖回報）'
          const debugEl = document.createElement('p')
          debugEl.style.cssText = 'margin-top:12px;font-size:11px;color:#94a3b8;word-break:break-all;font-family:monospace;'
          debugEl.textContent = location.href
          statusEl.after(debugEl)
          return
        }

        function redirect(url) {
          location.replace(url)
        }

        let config = null
        try {
          const configRes = await fetch('/api/liff-config')
          config = configRes.ok ? await configRes.json() : null
        } catch (e) {
          // 忽略，config 保持 null
        }

        // 在 LINE App 內開啟時通常已經有登入狀態，可以直接拿到身份；
        // 用電腦或一般瀏覽器開啟時沒有這個登入狀態，改用 liff.login() 導去 LINE 登入頁，
        // 登入完成後 LINE 會照 redirectUri 導回同一個網址（含原本的參數），流程會重新跑一次
        async function ensureLogin() {
          if (!config || !config.liffId || !window.liff) return { ok: false, redirecting: false }
          try {
            await liff.init({ liffId: config.liffId })
            if (!liff.isLoggedIn()) {
              statusEl.textContent = '需要登入 LINE 才能繼續，正在為您導向登入頁...'
              liff.login({ redirectUri: location.href })
              return { ok: false, redirecting: true }
            }
            return { ok: true, redirecting: false }
          } catch (e) {
            return { ok: false, redirecting: false }
          }
        }

        // 回傳 'redirecting'（正在導去 LINE 登入，呼叫端不能再自行導向別的網址）、
        // 'done'（追蹤/貼標已嘗試完成，不論成功與否）
        async function trackIfPossible(fetchCall) {
          const { ok, redirecting } = await ensureLogin()
          if (redirecting) return 'redirecting'
          if (ok) {
            const idToken = liff.getIDToken()
            if (idToken) {
              try {
                await fetchCall(idToken)
              } catch (e) {
                // 追蹤/貼標失敗不能卡住使用者
              }
            }
          }
          return 'done'
        }

        if (clickToken) {
          let targetUrl = null
          try {
            const res = await fetch('/api/click-targets/' + encodeURIComponent(clickToken))
            if (res.ok) targetUrl = (await res.json()).target_url
          } catch (e) {
            // ignore
          }
          if (!targetUrl) {
            statusEl.textContent = '找不到這個連結，請聯絡管理員'
            return
          }

          const result = await Promise.race([
            trackIfPossible((idToken) =>
              fetch('/api/click-targets/' + encodeURIComponent(clickToken) + '/track', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ idToken: idToken }),
              })
            ),
            new Promise((resolve) => setTimeout(() => resolve('timeout'), 1500)),
          ])
          if (result === 'redirecting') return

          redirect(targetUrl)
          return
        }

        // 會員來源追蹤（加入好友）模式：LIFF 若設定「Add friend option: On」，
        // liff.init() 過程中就會自動顯示加好友提示（若使用者尚未是好友）
        statusEl.textContent = '正在為您完成加入流程...'
        const result = await trackIfPossible((idToken) =>
          fetch('/api/join-links/' + encodeURIComponent(joinId) + '/track', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ idToken: idToken }),
          })
        )
        if (result === 'redirecting') return

        if (config && config.basicId) {
          redirect('https://line.me/R/oaMessage/' + config.basicId + '/')
        } else {
          statusEl.textContent = '歡迎加入！'
        }
      })()
    </script>
  </body>
</html>
