<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>正在為您導向...</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        color: #64748b;
        font-size: 14px;
        text-align: center;
        padding: 0 24px;
      }
    </style>
  </head>
  <body>
    <p id="status">正在為您導向...</p>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
      ;(async function () {
        const statusEl = document.getElementById('status')
        const params = new URLSearchParams(location.search)
        let clickToken = params.get('t')
        let joinId = params.get('j')

        // liff.state 包住的參數要等 LINE/LIFF 處理過才會展開成真正的 query string，
        // 但頁面剛載入時網址上可能還是原始的 ?liff.state=... 形式，所以這裡自己先解一次，
        // 不依賴 LINE 一定會在載入前就展開好
        if (!clickToken && !joinId) {
          const rawState = params.get('liff.state')
          if (rawState) {
            const decoded = new URLSearchParams(rawState)
            clickToken = decoded.get('t')
            joinId = decoded.get('j')
          }
        }

        if (!clickToken && !joinId) {
          statusEl.textContent = '缺少必要參數（除錯用，請截圖回報）'
          const debugEl = document.createElement('p')
          debugEl.style.cssText = 'margin-top:12px;font-size:11px;color:#94a3b8;word-break:break-all;font-family:monospace;'
          debugEl.textContent = location.href
          statusEl.after(debugEl)
          return
        }

        function redirect(url) {
          location.replace(url)
        }

        let config = null
        try {
          const configRes = await fetch('/api/liff-config')
          config = configRes.ok ? await configRes.json() : null
        } catch (e) {
          // 忽略，config 保持 null
        }

        async function withLiffIdToken(callback) {
          if (!config || !config.liffId || !window.liff) return
          try {
            await liff.init({ liffId: config.liffId })
            if (liff.isLoggedIn()) {
              const idToken = liff.getIDToken()
              if (idToken) await callback(idToken)
            }
          } catch (e) {
            // 追蹤/貼標失敗不能卡住使用者
          }
        }

        if (clickToken) {
          let targetUrl = null
          try {
            const res = await fetch('/api/click-targets/' + encodeURIComponent(clickToken))
            if (res.ok) targetUrl = (await res.json()).target_url
          } catch (e) {
            // ignore
          }
          if (!targetUrl) {
            statusEl.textContent = '找不到這個連結，請聯絡管理員'
            return
          }

          await Promise.race([
            withLiffIdToken((idToken) =>
              fetch('/api/click-targets/' + encodeURIComponent(clickToken) + '/track', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ idToken: idToken }),
              })
            ),
            new Promise((resolve) => setTimeout(resolve, 1500)),
          ])

          redirect(targetUrl)
          return
        }

        // 會員來源追蹤（加入好友）模式：LIFF 若設定「Add friend option: On」，
        // liff.init() 過程中就會自動顯示加好友提示（若使用者尚未是好友）
        statusEl.textContent = '正在為您完成加入流程...'
        await withLiffIdToken((idToken) =>
          fetch('/api/join-links/' + encodeURIComponent(joinId) + '/track', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ idToken: idToken }),
          })
        )

        if (config && config.basicId) {
          redirect('https://line.me/R/oaMessage/' + config.basicId + '/')
        } else {
          statusEl.textContent = '歡迎加入！'
        }
      })()
    </script>
  </body>
</html>
